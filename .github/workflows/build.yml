name: 最终修复打包
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: 安装环境
        run: |
          brew install ldid
          export THEOS=/opt/theos
          sudo mkdir -p $THEOS
          curl -L https://github.com/theos/theos/archive/master.tar.gz | sudo tar -xz -C $THEOS --strip-components=1
          sudo mkdir -p $THEOS/sdks
          curl -L https://github.com/theos/sdks/archive/master.tar.gz | sudo tar -xz -C $THEOS/sdks --strip-components=1
          sudo chown -R $(whoami) $THEOS
          echo "THEOS=$THEOS" >> $GITHUB_ENV
      - name: 编译
        run: |
          make package FINALPACKAGE=1 messages=yes
      - name: 上传
        uses: actions/upload-artifact@v4
        with:
          name: VirtualCamera-Ready
          path: packages/*.deb
