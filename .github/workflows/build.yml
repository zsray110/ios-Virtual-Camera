name: 一键在线打包
on: [push, workflow_dispatch] # push 代码或点击按钮都会触发

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 准备 Theos 环境
        run: |
          # 下载预配置好的 Theos (避开 git clone 128 错误)
          curl -L https://github.com/theos/theos/archive/master.tar.gz -o theos.tar.gz
          sudo mkdir -p /opt/theos
          sudo tar -xzf theos.tar.gz -C /opt/theos --strip-components=1
          
          # 下载 iOS 14 SDK
          sudo mkdir -p /opt/theos/sdks
          curl -L https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz -o sdk.tar.xz
          sudo tar -xJf sdk.tar.xz -C /opt/theos/sdks
          
          echo "THEOS=/opt/theos" >> $GITHUB_ENV

      - name: 开始编译打包
        run: |
          # 这一步是核心，强制适配 iOS 14 和 64位架构
          export TARGET=iphone:clang:latest:14.0
          export ARCHS="arm64 arm64e"
          make package FINALPACKAGE=1

      - name: 保存打包好的文件
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: VirtualCamera-iOS14-成品
          path: packages/*.deb
